# ─────────────────────────────────────────────────────────────
#  Learnyx – Docker Compose (Root)
#  Запуск: docker-compose up --build -d
#
#  Сервіси:
#    db       → PostgreSQL 16   (порт 5432)
#    app      → Django backend  (порт 8000)
#    pgadmin  → pgAdmin 4       (порт 5050)
#    nginx    → Reverse Proxy   (порт 8080)
# ─────────────────────────────────────────────────────────────

services:

  # ── 1. PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: learnyx_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - learnyx_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. Django Backend ──────────────────────────────────────
  app:
    build:
      context: ./server        # збираємо з папки server/
      dockerfile: Dockerfile
    container_name: learnyx_app
    restart: unless-stopped
    env_file:
      - ./server/.env          # змінні оточення
    environment:
      DB_HOST: db              
      DB_PORT: 5432
    volumes:
      - ./server:/app          # hot-reload під час розробки
      - static_volume:/app/static  # Спільна папка для статики з Nginx
    ports:
      - "8000:8000"            # прямий доступ до бекенду (опціонально)
    networks:
      - learnyx_network
    depends_on:
      db:
        condition: service_healthy
    # Збираємо статику, накочуємо міграції, сідуємо базу і запускаємо gunicorn
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate --noinput &&
             python manage.py seed &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000"

  # ── 3. pgAdmin ─────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: learnyx_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASS}
    ports:
      - "5050:80"
    networks:
      - learnyx_network
    depends_on:
      - db

  # ── 4. Nginx (Reverse Proxy) ───────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: learnyx_nginx
    restart: unless-stopped
    ports:
      - "8080:80"  # Доступ до API через Swagger/браузер (http://localhost:8080)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/static
    networks:
      - learnyx_network
    depends_on:
      - app

# ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  static_volume: # Оголошуємо volume для статики

networks:
  learnyx_network:
    driver: bridge
